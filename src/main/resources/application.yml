# Nombre de la aplicaciÃ³n.
spring:
  application:
    name: restaurant-api

  # Configuraciï¿½n de la conexiï¿½n a la base de datos PostgreSQL.
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Configuraciï¿½n de JPA e Hibernate.
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

# Puerto del servidor embebido.
server:
  port: 8080
